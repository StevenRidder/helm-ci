<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Helm — iPhone (canonical UI)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
html,body{margin:0;background:#05080c;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
</head>
<body>
<div style="background:#05080c;border-radius:18px;padding:18px;display:flex;justify-content:center;">
<h2 class="sr-only">Pixel-perfect iPhone screenshot of Helm in portrait, underway: a buoyed channel approach toward a marina.</h2>
<style>
.ip{--deepw:#ecf6fc;--midw:#cfe7f4;--shoalw:#a9d6ec;--dry:#c7dcb4;--land:#ece3c0;--ledge:#bda972;--contour:#8fb4c9;--sound:#4f6c80;--grn:#0a9a46;--red:#dd3b3b;--mag:#d6219a;--windhi:#c8781a;--cur:#2f7fc4;--glass:rgba(13,19,27,.72);--glass2:rgba(30,41,54,.6);--line:rgba(255,255,255,.14);--ctext:#eef4f9;--cdim:#9bb0c0;--accent:#5bc0ff;--ok:#46e0a0;--danger:#ff6b6b;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif}
.ip.dusk{--deepw:#160d12;--midw:#241620;--shoalw:#3a2236;--dry:#2a2414;--land:#2a2013;--ledge:#5a4022;--contour:#7a5a64;--sound:#caa090;--grn:#5ec47e;--red:#ff7a7a;--mag:#ff79b0;--windhi:#ffd08a;--cur:#c79152}
.ip.night{--deepw:#061521;--midw:#0c2738;--shoalw:#143f55;--dry:#1d3327;--land:#242a1b;--ledge:#4c5531;--contour:#356a83;--sound:#8fb7cf;--grn:#2ec46b;--red:#ff5b5b;--mag:#ff5ba6;--windhi:#ffd16b;--cur:#5aa6e8}
.glass{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:.5px solid var(--line)}
.mt{flex:1;text-align:center;border-right:.5px solid var(--line)}
.mt .l{font-size:10px;color:var(--cdim)}
.mt .v{font-size:19px;font-weight:600;color:var(--ctext);font-variant-numeric:tabular-nums;line-height:1.15}
.fab{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;color:var(--ctext);font-size:20px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--cdim)}
.tab.on{color:var(--accent)}.tab i{font-size:20px}
</style>
<div class="ip" id="ip" style="background:#000;padding:7px;border-radius:40px;box-shadow:0 30px 80px -20px rgba(0,0,0,.85)">
  <div style="width:262px;height:556px;border-radius:34px;overflow:hidden;position:relative;background:var(--deepw)">
    <svg viewBox="0 0 262 556" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;width:100%;height:100%">
      <defs><radialGradient id="ipw" cx="0.6" cy="0.45" r="0.75"><stop offset="0" stop-color="var(--deepw)"/><stop offset="1" stop-color="var(--midw)"/></radialGradient>
      <marker id="ipc" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,1 L8,4.5 L0,8" fill="none" stroke="var(--cur)" stroke-width="1.3"/></marker></defs>
      <rect width="262" height="556" fill="url(#ipw)"/>
      <ellipse cx="195" cy="455" rx="74" ry="48" fill="var(--shoalw)"/><ellipse cx="210" cy="470" rx="26" ry="13" fill="var(--dry)"/>
      <path d="M0,0 H146 C144,56 122,92 110,130 C130,150 132,162 120,182 C100,214 112,300 86,362 C70,414 78,486 70,556 H0 Z" fill="var(--land)" stroke="var(--ledge)" stroke-width="1.5"/>
      <path d="M150,540 Q120,360 150,300 Q180,250 210,230" fill="none" stroke="var(--contour)" stroke-width="1" stroke-dasharray="4 5" opacity=".7"/>
      <g fill="var(--sound)" font-size="9" font-family="ui-monospace,monospace" opacity=".85"><text x="205" y="120">38</text><text x="165" y="205">22</text><text x="215" y="310">12</text><text x="190" y="405">8</text><text x="120" y="470">6</text><text x="150" y="160">19</text></g>
      <path d="M210,95 l20,-10 M230,85 l5,3 M227,88 l5,3 M224,91 l5,3" stroke="var(--windhi)" stroke-width="1.6" stroke-linecap="round" opacity=".85"/>
      <path d="M196,360 L150,310" stroke="var(--cur)" stroke-width="1.3" marker-end="url(#ipc)" opacity=".7"/><text x="158" y="356" fill="var(--cur)" font-size="9">1.2 kt</text>
      <g transform="translate(112,182)"><path d="M0,-12 L0,4 M-6,-7 a6,6 0 0,1 12,0" stroke="var(--mag)" stroke-width="1.4" fill="none"/></g><text x="68" y="180" fill="var(--mag)" font-size="9">Fl 4s</text>
      <g transform="translate(92,150)"><path d="M-12,0 h24 M-9,0 v-8 h5 v8 M-2,0 v-8 h5 v8 M5,0 v-8 h5 v8" stroke="var(--ledge)" stroke-width="1.3" fill="none"/></g>
      <g><circle cx="178" cy="452" r="4.5" fill="var(--grn)"/><line x1="178" y1="447" x2="178" y2="434" stroke="var(--grn)" stroke-width="1.2"/><text x="184" y="441" fill="var(--grn)" font-size="9">G"3"</text></g>
      <g><circle cx="138" cy="446" r="4.5" fill="var(--red)"/><rect x="135.5" y="429" width="5" height="5" fill="var(--red)"/><text x="113" y="439" fill="var(--red)" font-size="9">R"4"</text></g>
      <g><circle cx="150" cy="332" r="4.5" fill="var(--grn)"/><text x="156" y="326" fill="var(--grn)" font-size="9">G"5"</text></g>
      <g><circle cx="116" cy="222" r="4.5" fill="var(--red)"/><text x="92" y="216" fill="var(--red)" font-size="9">R"6"</text></g>
      <polyline points="150,548 162,452 138,395 116,258 92,150" fill="none" stroke="var(--mag)" stroke-width="2.4" opacity=".9" stroke-linejoin="round"/>
      <line x1="162" y1="452" x2="138" y2="395" stroke="var(--mag)" stroke-width="3.6" stroke-linecap="round"/>
      <g fill="var(--deepw)" stroke="var(--mag)" stroke-width="1.7"><rect x="157" y="447" width="10" height="10" transform="rotate(45 162 452)"/><rect x="111" y="253" width="10" height="10" transform="rotate(45 116 258)"/><rect x="87" y="145" width="10" height="10" transform="rotate(45 92 150)"/></g>
      <text x="148" y="430" fill="var(--mag)" font-size="9.5" font-weight="500">335° · 0.6 NM</text>
      <line x1="138" y1="395" x2="116" y2="320" stroke="var(--accent)" stroke-width="1.4" opacity=".8"/>
      <line x1="138" y1="395" x2="160" y2="345" stroke="var(--mag)" stroke-width="1.3" stroke-dasharray="5 4" opacity=".7"/>
      <g transform="translate(138,395) rotate(-18)"><path d="M0,-14 L7.5,10 L0,5 L-7.5,10 Z" fill="var(--accent)" stroke="#fff" stroke-width="1.2"/></g>
      <g transform="translate(178,238)"><g transform="rotate(205)"><path d="M0,-8 L5,7 L-5,7 Z" fill="var(--grn)"/></g></g><text x="186" y="236" fill="var(--sound)" font-size="9">SV Pelagia</text>
    </svg>
    <div style="position:absolute;top:0;left:0;right:0;height:54px;background:linear-gradient(180deg,rgba(0,10,18,.32),transparent)"></div>
    <div style="position:absolute;top:14px;left:18px;font-size:13px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)">11:42</div>
    <div style="position:absolute;top:15px;right:16px;display:flex;gap:5px;color:#fff;font-size:13px;text-shadow:0 1px 3px rgba(0,0,0,.5)"><i class="ti ti-antenna-bars-5" aria-hidden="true"></i><i class="ti ti-wifi" aria-hidden="true"></i><i class="ti ti-battery-3" aria-hidden="true"></i></div>
    <div style="position:absolute;top:9px;left:50%;transform:translateX(-50%);width:88px;height:25px;border-radius:14px;background:#000"></div>
    <div class="glass" style="position:absolute;top:46px;left:10px;right:10px;height:50px;border-radius:15px;display:flex;align-items:center">
      <div class="mt"><div class="l">SOG</div><div class="v">6.2</div></div>
      <div class="mt"><div class="l">COG</div><div class="v">316°</div></div>
      <div class="mt"><div class="l">Depth</div><div class="v">8.4</div></div>
      <div style="width:46px;display:flex;align-items:center;justify-content:center"><div id="ipth" style="width:32px;height:32px;border-radius:10px;background:var(--glass2);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:17px"><i class="ti ti-sun" aria-hidden="true"></i></div></div>
    </div>
    <div style="position:absolute;right:10px;top:300px;display:flex;flex-direction:column;gap:8px">
      <div class="fab glass" aria-label="Layers"><i class="ti ti-stack-2" aria-hidden="true"></i></div>
      <div class="fab glass" aria-label="Center on boat"><i class="ti ti-current-location" style="color:var(--accent)" aria-hidden="true"></i></div>
    </div>
    <div class="glass" style="position:absolute;left:8px;right:8px;bottom:70px;border-radius:18px;padding:11px 13px">
      <div style="width:34px;height:4px;border-radius:2px;background:var(--glass2);margin:0 auto 9px"></div>
      <div style="display:flex;align-items:center;gap:8px"><i class="ti ti-route" style="font-size:16px;color:var(--mag)" aria-hidden="true"></i><span style="font-size:13px;font-weight:500;color:var(--ctext)">Route to Marina</span><span style="margin-left:auto;font-size:11px;color:var(--ok)"><i class="ti ti-arrow-up-left" style="font-size:13px;vertical-align:-2px" aria-hidden="true"></i> next R"4"</span></div>
      <div style="display:flex;gap:16px;margin-top:9px">
        <div><div style="font-size:10px;color:var(--cdim)">ETA</div><div style="font-size:15px;color:var(--ctext);font-variant-numeric:tabular-nums">11:42</div></div>
        <div><div style="font-size:10px;color:var(--cdim)">DTG</div><div style="font-size:15px;color:var(--ctext);font-variant-numeric:tabular-nums">2.4 NM</div></div>
        <div><div style="font-size:10px;color:var(--cdim)">XTE</div><div style="font-size:15px;color:var(--ok);font-variant-numeric:tabular-nums">12 m</div></div>
        <div><div style="font-size:10px;color:var(--cdim)">TWS</div><div style="font-size:15px;color:var(--ctext);font-variant-numeric:tabular-nums">14 kn</div></div>
      </div>
    </div>
    <div class="glass" style="position:absolute;left:0;right:0;bottom:0;height:64px;display:flex;align-items:flex-start;padding:9px 6px 0;border-bottom:none;border-left:none;border-right:none">
      <div class="tab on"><i class="ti ti-map-2" aria-hidden="true"></i>Chart</div>
      <div class="tab"><i class="ti ti-route" aria-hidden="true"></i>Routes</div>
      <div class="tab"><i class="ti ti-cloud" aria-hidden="true"></i>Weather</div>
      <div class="tab"><i class="ti ti-ship" aria-hidden="true"></i>AIS</div>
      <div class="tab"><i class="ti ti-dots" aria-hidden="true"></i>More</div>
    </div>
    <div style="position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:120px;height:5px;border-radius:3px;background:var(--ctext);opacity:.55"></div>
  </div>
</div>
</div>
<script>
(function(){var r=document.getElementById('ip');var b=document.getElementById('ipth');var modes=['','dusk','night'];var icons=['ti ti-sun','ti ti-sunset-2','ti ti-moon'];var i=0;b.addEventListener('click',function(){i=(i+1)%3;r.className='ip'+(modes[i]?' '+modes[i]:'');b.querySelector('i').className=icons[i];});})();
</script>
</body>
</html>
