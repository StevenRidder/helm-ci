<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Helm — tracer bullet</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#05080c;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  #map{position:absolute;inset:0}
  .panel{position:absolute;top:12px;left:12px;z-index:2;background:rgba(13,19,27,.78);backdrop-filter:blur(18px);
    border:.5px solid rgba(255,255,255,.14);border-radius:12px;padding:10px 12px;color:#eef4f9}
  .panel h1{font-size:13px;font-weight:600;margin:0 0 8px}
  .row{display:flex;align-items:center;gap:8px;font-size:12px;color:#cdd9e3;padding:3px 0;cursor:pointer}
  .row input{accent-color:#5bc0ff}
  .hint{font-size:11px;color:#8aa3b5;margin-top:8px;max-width:200px;line-height:1.4}
</style>
</head>
<body>
<div id="map"></div>
<div class="panel">
  <h1>Helm · layers</h1>
  <label class="row"><input type="checkbox" data-layer="satellite" checked> Satellite (Sentinel-2)</label>
  <label class="row"><input type="checkbox" data-layer="charts"> NOAA chart</label>
  <label class="row"><input type="checkbox" data-layer="depare-fill" checked> Depth areas</label>
  <label class="row"><input type="checkbox" data-layer="depcnt-line" checked> Depth contours</label>
  <label class="row"><input type="checkbox" data-layer="soundg-text" checked> Soundings</label>
  <label class="row"><input type="checkbox" data-layer="route-line" checked> Route</label>
  <label class="row"><input type="checkbox" data-layer="wind-arrows" checked> Wind (arrows)</label>
  <label class="row"><input type="checkbox" id="wind-toggle"> Wind (animated)</label>
  <label class="row"><input type="checkbox" data-layer="places" checked> Places</label>
  <label class="row"><input type="checkbox" data-layer="ais" checked> AIS targets</label>
  <div class="hint">Satellite + route load live. Depth, wind, places &amp; AIS appear after
    you run the pipeline (see pipeline/README.md).</div>
</div>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="wind-layer.js"></script>
<script>
  const map = new maplibregl.Map({ container: 'map', style: 'style.json', hash: true });
  map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'bottom-right');
  map.addControl(new maplibregl.ScaleControl({ unit: 'nautical' }), 'bottom-left');
  // layer toggles: data-layer matches a layer id OR a group prefix (places-, ais-)
  document.querySelectorAll('.row input[data-layer]').forEach(cb => {
    cb.addEventListener('change', () => {
      const id = cb.dataset.layer;
      const vis = cb.checked ? 'visible' : 'none';
      map.getStyle().layers
        .filter(l => l.id === id || l.id.startsWith(id + '-'))
        .forEach(l => map.setLayoutProperty(l.id, 'visibility', vis));
    });
  });

  // animated wind (a canvas overlay, not a style layer)
  const wind = window.HelmWind ? window.HelmWind(map) : null;
  map.on('load', () => { if (wind) wind.load('data/wind.json'); });
  const wt = document.getElementById('wind-toggle');
  if (wt && wind) wt.addEventListener('change', () => wind.setVisible(wt.checked));
  // tap a sounding/wind node to inspect it
  map.on('click', 'soundg-text', e => new maplibregl.Popup().setLngLat(e.lngLat)
    .setHTML('Depth: ' + e.features[0].properties.DEPTH + ' m').addTo(map));
  map.on('click', 'wind-arrows', e => new maplibregl.Popup().setLngLat(e.lngLat)
    .setHTML(e.features[0].properties.speed_kn + ' kn @ ' + e.features[0].properties.dir_deg + '°').addTo(map));
  map.on('click', 'places-icon', e => { const p = e.features[0].properties;
    new maplibregl.Popup().setLngLat(e.lngLat).setHTML('<b>' + (p.name || p.kind) + '</b><br>' + p.kind).addTo(map); });
  map.on('click', 'ais-vessels', e => { const p = e.features[0].properties;
    new maplibregl.Popup().setLngLat(e.lngLat).setHTML('<b>' + (p.name || 'AIS target') + '</b><br>SOG ' + (p.sog ?? '?') + ' · COG ' + (p.cog ?? '?') + (p.cpa != null ? ' · CPA ' + p.cpa + ' NM' : '')).addTo(map); });
</script>
</body>
</html>
